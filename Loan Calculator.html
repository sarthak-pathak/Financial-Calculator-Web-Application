<!DOCTYPE html>
<html>
<head>
    <title>Loan Repayment Calculator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #f0f2f5;
        }
        .calculator-card {
            margin-top: 60px;
            border-radius: 16px;
            background: white;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .card-header-custom {
            background: linear-gradient(90deg, #2d4be0, #4a6bff);
            color: white;
            padding: 18px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        label {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="calculator-card">

                <div class="card-header-custom">
                    <span>Loan Repayment Calculator</span>
                    <span class="badge bg-white text-primary px-3 py-2" style="border-radius: 20px;">
                        Monthly amortized payment
                    </span>
                </div>

                <div class="p-4">

                    <div id="error" class="alert alert-danger d-none"></div>

                    <div class="mb-3">
                        <label>Loan Amount ($)</label>
                        <input id="amount" type="number" class="form-control" placeholder="e.g., 15000">
                        <div class="form-text">Principal you are borrowing.</div>
                    </div>

                    <div class="mb-3">
                        <label>Loan Term (years)</label>
                        <input id="years" type="number" class="form-control" placeholder="e.g., 5">
                        <div class="form-text">You can use decimals (e.g., 7.5 years).</div>
                    </div>

                    <div class="mb-3">
                        <label>APR (%)</label>
                        <input id="apr" type="number" class="form-control" placeholder="e.g., 6.99">
                        <div class="form-text">Annual Percentage Rate (nominal). Payments assumed monthly.</div>
                    </div>

                    <div class="d-grid mb-3">
                        <button id="calc" class="btn btn-primary btn-lg" type="button">
                            Calculate
                        </button>
                    </div>

                    <div id="results" class="d-none">
                        <p><strong>Monthly Payment:</strong> <span id="mp"></span></p>
                        <p><strong>Total Paid:</strong> <span id="tp"></span></p>
                        <p><strong>Total Interest:</strong> <span id="ti"></span></p>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
$("#calc").click(function () {

    $("#error").addClass("d-none").text("");
    $("#results").addClass("d-none");

    let P = parseFloat($("#amount").val());
    let Y = parseFloat($("#years").val());
    let APR = parseFloat($("#apr").val());

    if (isNaN(P) || P <= 0 || isNaN(Y) || Y <= 0 || isNaN(APR) || APR < 0) {
        $("#error").removeClass("d-none").text("Please enter valid positive numbers.");
        return;
    }

    let r = APR / 100 / 12;
    let n = Y * 12;

    let M = (r === 0) ? (P / n) : (P * r / (1 - Math.pow(1 + r, -n)));
    let totalPaid = M * n;
    let totalInterest = totalPaid - P;

    $("#mp").text("$" + M.toFixed(2));
    $("#tp").text("$" + totalPaid.toFixed(2));
    $("#ti").text("$" + totalInterest.toFixed(2));

    $("#results").removeClass("d-none");
});
</script>

</body>
</html>
