<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Test Time Manager</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .calculator-shell {
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            color: #e5e7eb;
        }
        .calc-header {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .calc-title {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .calc-tag {
            background: white;
            color: #1d4ed8;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .calc-body {
            padding: 24px;
        }
        label {
            font-weight: 600;
        }
        .form-control {
            background-color: #020617;
            border-color: #475569;
            color: #e5e7eb;
        }
        .btn-main {
            background: linear-gradient(90deg, #2563eb, #22c55e);
            border: none;
            font-weight: 600;
        }
        #results {
            background: rgba(15, 118, 110, 0.12);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-8 col-lg-6">

<div class="calculator-shell">

<div class="calc-header">
<div class="calc-title">Aptitude Test Time Manager</div>
<div class="calc-tag">Exam Strategy Tool</div>
</div>

<div class="calc-body">

<div id="error" class="alert alert-danger d-none"></div>

<div class="mb-3">
<label>Total Questions</label>
<input id="q" type="number" class="form-control" placeholder="e.g., 60">
</div>

<div class="mb-3">
<label>Total Time (minutes)</label>
<input id="t" type="number" class="form-control" placeholder="e.g., 90">
</div>

<div class="mb-3">
<label>Expected Accuracy (%)</label>
<input id="a" type="number" class="form-control" placeholder="e.g., 75">
</div>

<div class="mb-3">
<label>Marks per Question</label>
<input id="m" type="number" class="form-control" value="1">
</div>

<div class="d-grid">
<button id="calc" type="button" class="btn btn-main btn-lg">
Calculate Strategy
</button>
</div>

<div id="results" class="d-none">
<p><strong>Time per question:</strong> <span id="tpq"></span></p>
<p><strong>Estimated correct:</strong> <span id="correct"></span></p>
<p><strong>Estimated score:</strong> <span id="score"></span></p>
<p id="strategy"></p>
</div>

</div>
</div>
</div>
</div>
</div>

<script>
$("#calc").click(function () {

$("#error").addClass("d-none").text("");
$("#results").addClass("d-none");

let Q = parseFloat($("#q").val());
let T = parseFloat($("#t").val());
let A = parseFloat($("#a").val());
let M = parseFloat($("#m").val());

if (isNaN(Q) || Q <= 0 ||
isNaN(T) || T <= 0 ||
isNaN(A) || A < 0 || A > 100 ||
isNaN(M) || M <= 0) {

$("#error").removeClass("d-none")
.text("Please enter valid positive values. Accuracy must be between 0 and 100.");
return;
}

let timePerQ = T / Q;
let correct = Q * (A / 100);
let score = correct * M;

$("#tpq").text(timePerQ.toFixed(2) + " min/question");
$("#correct").text(correct.toFixed(1));
$("#score").text(score.toFixed(1));

let strat = "";

if (timePerQ < 1) {
strat = "Very fast-paced exam. Focus on easy questions first.";
} else if (timePerQ <= 2) {
strat = "Moderate pace. Balance speed and accuracy.";
} else {
strat = "Comfortable pace. Focus on accuracy.";
}

if (A < 60) {
strat += " Improve accuracy through more practice.";
} else if (A > 80) {
strat += " High accuracy — try increasing speed slightly.";
}

$("#strategy").text(strat);
$("#results").removeClass("d-none");
});
</script>

</body>
</html>
